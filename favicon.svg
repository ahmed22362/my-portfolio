<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#04111f"/>
  <!-- Katana blade -->
  <line x1="9" y1="4" x2="21" y2="26" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Tsuba (guard) — diamond -->
  <polygon points="15,13 17,10 19,13 17,16" fill="#0ea5e9"/>
  <!-- Tsuba ring -->
  <circle cx="17" cy="13" r="4.5" fill="none" stroke="#0369a1" stroke-width="1"/>
  <!-- Tsuka (handle) — thick short line -->
  <line x1="21" y1="26" x2="26" y2="30" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round"/>
</svg>
